<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提交企业需求 | 左安门</title>
  <link rel="stylesheet" href="../shared/shared.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="site-shell find-talent-page">
    <div data-shared-header></div>

    <main>
      <section class="hero-section" aria-labelledby="page-title">
        <div class="container hero-grid">
          <div class="hero-copy" data-reveal>
            <p class="eyebrow">企业需求入口</p>
            <h1 id="page-title">提交你的关键问题</h1>
            <p class="hero-lede">
              左安门会先了解你的企业阶段、问题类型和任务边界，再判断适合的高阶人才匹配方式。
            </p>

            <ul class="hero-points" aria-label="页面说明">
              <li>收集必要信息，减少来回沟通</li>
              <li>让问题描述更接近真实业务场景</li>
              <li>为后续诊断和匹配留出清晰入口</li>
            </ul>
          </div>

          <form class="inquiry-card" id="inquiry-form" novalidate data-reveal>
            <div class="card-head">
              <p class="card-eyebrow">提交企业需求</p>
              <h2>我们先了解你正在面对什么</h2>
              <p class="card-note">字段不多，重点是把关键问题说清楚。</p>
            </div>

            <div class="form-grid">
              <label class="field">
                <span>姓名 *</span>
                <input type="text" name="name" autocomplete="name" required placeholder="请输入联系人姓名">
                <small class="field-error" data-error-for="name"></small>
              </label>

              <label class="field">
                <span>公司 *</span>
                <input type="text" name="company" autocomplete="organization" required placeholder="请输入公司名称">
                <small class="field-error" data-error-for="company"></small>
              </label>

              <label class="field">
                <span>职位</span>
                <input type="text" name="title" autocomplete="organization-title" placeholder="请输入职位">
              </label>

              <label class="field">
                <span>联系方式 *</span>
                <input type="text" name="contact" autocomplete="email" required placeholder="邮箱或电话">
                <small class="field-error" data-error-for="contact"></small>
              </label>

              <label class="field">
                <span>企业阶段 / 规模</span>
                <select name="stage">
                  <option value="">请选择</option>
                  <option>初创</option>
                  <option>成长期</option>
                  <option>扩张期</option>
                  <option>转型期</option>
                  <option>成熟期</option>
                </select>
              </label>

              <label class="field">
                <span>时间要求</span>
                <select name="timeline">
                  <option value="">请选择</option>
                  <option>尽快</option>
                  <option>两周内</option>
                  <option>一个月内</option>
                  <option>三个月内</option>
                </select>
              </label>

              <label class="field field--full">
                <span>当前最想解决的问题 *</span>
                <textarea name="problem" rows="5" required placeholder="请直接描述你现在最关键的业务问题、项目目标或岗位需求"></textarea>
                <small class="field-error" data-error-for="problem"></small>
              </label>

              <label class="field field--full">
                <span>希望左安门帮助判断什么</span>
                <textarea name="expectation" rows="4" placeholder="例如：是否需要 interim、on-demand talent，还是先做任务诊断"></textarea>
              </label>
            </div>

            <div class="form-foot">
              <p class="helper-copy">填写前可准备：公司背景、当前问题、希望的时间节点。</p>
              <button class="button button--primary submit-button" type="submit">提交企业需求</button>
            </div>

            <div class="form-status" data-form-status hidden role="status" aria-live="polite"></div>
          </form>
        </div>
      </section>

      <section class="project-prompt-section" aria-labelledby="project-prompt-title" data-reveal>
        <div class="container">
          <div class="project-prompt">
            <div>
              <p class="eyebrow">已有明确任务？</p>
              <h2 id="project-prompt-title">可以直接写进问题描述里</h2>
            </div>
            <p class="prompt-copy">
              如果你已经有项目 brief、岗位需求或阶段性目标，可以在上面的表单里直接说明。
            </p>
            <div class="prompt-actions">
              <a class="button button--secondary" href="/services/on-demand-talent">查看服务方式</a>
              <a class="button button--primary" href="#inquiry-form">返回表单</a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div data-shared-footer></div>
  </div>

  <script src="../shared/shared.js"></script>
  <script src="./script.js"></script>
</body>
</html>
